symbol = "󰏗 "

[pijul_channel]
symbol = " "

[python]
symbol = " "

[rlang]
symbol = "󰟔 "

[ruby]
symbol = " "

[rust]
symbol = " "

[scala]
symbol = " "

[status]
format = ' [$symbol$status]($style)'

[sudo]
disabled = false
symbol = " 💀"
format = '[$symbol]($style)'

[time]
disabled = false
use_12hr = true
time_format = "%I:%M %p"
style = "bold white"
format = ' [󰥔 $time]($style)'

[username]
style_user = 'bold color_yellow'
style_root = 'bold color_red1'
